<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Assistant">
  <!-- Original icon: robot head + chat bubble, no outer circle/background -->
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B4F91"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Chat bubble (kept subtle + on-brand) -->
  <path d="M82 14h34a10 10 0 0 1 10 10v22a10 10 0 0 1-10 10h-14l-10 10v-10H82a10 10 0 0 1-10-10V24a10 10 0 0 1 10-10z" fill="url(#pink)" opacity="0.95"/>
  <circle cx="92" cy="35" r="4" fill="#fff"/>
  <circle cx="102" cy="35" r="4" fill="#fff"/>
  <circle cx="112" cy="35" r="4" fill="#fff"/>

  <!-- Robot head outline -->
  <rect x="18" y="44" width="92" height="64" rx="22" fill="url(#blue)"/>
  <rect x="26" y="52" width="76" height="48" rx="18" fill="#FFFFFF" opacity="0.96"/>

  <!-- Antenna -->
  <path d="M48 44v-10" stroke="url(#blue)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="48" cy="30" r="7" fill="#2563EB"/>
  <circle cx="48" cy="30" r="3" fill="#fff" opacity="0.85"/>

  <!-- Side pods -->
  <path d="M12 64a14 14 0 0 1 14-14h0v52h0A14 14 0 0 1 12 88V64z" fill="#1B4F91" opacity="0.9"/>
  <path d="M116 50h0a14 14 0 0 1 14 14v24a14 14 0 0 1-14 14h0V50z" fill="#1B4F91" opacity="0.9"/>

  <!-- Face -->
  <circle cx="52" cy="76" r="6" fill="#1B4F91" opacity="0.95"/>
  <circle cx="76" cy="76" r="6" fill="#1B4F91" opacity="0.95"/>
  <path d="M56 90c4 6 12 6 16 0" fill="none" stroke="#1B4F91" stroke-width="6" stroke-linecap="round"/>
</svg>
